name: انتقال فایل به گیت هاب

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'لینک مستقیم فایل'
        required: true
        type: string
      file_name:
        description: 'نام فایل خروجی (مثلاً: video.mp4)'
        required: true
        type: string
      delete_old_files:
        description: 'حذف فایل‌های قبلی از پوشه downloads'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  download-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Delete old files (optional)
        if: ${{ inputs.delete_old_files }}
        run: |
          if [ -d "downloads" ]; then
            rm -rf downloads
            git rm -r --cached downloads/ 2>/dev/null || true
            echo "پوشه downloads پاک شد."
          fi

      - name: Create downloads folder and download file
        run: |
          FOLDER="downloads/$(date +'%Y-%m-%d_%H-%M-%S')"
          mkdir -p "$FOLDER"
          echo "FOLDER=$FOLDER" >> $GITHUB_ENV

          OUTPUT_PATH="$FOLDER/${{ inputs.file_name }}"

          curl -L \
            --retry 5 \
            --retry-delay 10 \
            --connect-timeout 30 \
            -o "$OUTPUT_PATH" \
            "${{ inputs.file_url }}"

          FILE_SIZE=$(du -sh "$OUTPUT_PATH" | cut -f1)
          echo "FILE_SIZE=$FILE_SIZE" >> $GITHUB_ENV
          echo "OUTPUT_PATH=$OUTPUT_PATH" >> $GITHUB_ENV

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "📥 Add: ${{ inputs.file_name }} (${{ env.FILE_SIZE }})"

          for attempt in $(seq 1 5); do
            git pull --rebase origin main 2>/dev/null || true
            git push origin main && break
            echo "Retry $attempt..."
            sleep 10
          done

      - name: Summary
        run: |
          echo "## ✅ نتیجه انتقال" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| فیلد | مقدار |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| نام فایل | \`${{ inputs.file_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| حجم | ${{ env.FILE_SIZE }} |" >> $GITHUB_STEP_SUMMARY
          echo "| مسیر | \`${{ env.OUTPUT_PATH }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| وضعیت | موفق ✅ |" >> $GITHUB_STEP_SUMMARY